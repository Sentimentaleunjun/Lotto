<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강현쌤을 위한 로또 추첨기</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <h1>강현쌤을 위한 로또 추첨기 🎉</h1>
    <p class="subtitle">강현쌤은 부자가 될 것인가?</p>

    <section class="balls" aria-label="로또 번호">
      {% for number in numbers %}
      <span class="ball">{{ number }}</span>
      {% endfor %}
    </section>

    <form method="get" action="/">
      <button type="submit">다시 추첨하기</button>
    </form>
  </main>
</body>
</html>
